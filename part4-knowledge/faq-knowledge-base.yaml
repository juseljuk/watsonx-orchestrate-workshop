# Customer Support FAQ Knowledge Base
kind: knowledge_base
name: customer-support-faq
description: Frequently asked questions for customer support including shipping, returns, payments, and account management

documents:
  - title: "Shipping Policy"
    content: |
      # Shipping Policy
      
      ## Domestic Shipping Options
      We offer several shipping options for domestic orders:
      
      - **Standard Shipping**: 5-7 business days ($5.99)
      - **Express Shipping**: 2-3 business days ($12.99)
      - **Overnight Shipping**: 1 business day ($24.99)
      
      ## International Shipping
      We ship to most countries worldwide:
      
      - **International Standard**: 10-15 business days ($19.99)
      - **International Express**: 5-7 business days ($39.99)
      
      ## Free Shipping
      Orders over $50 qualify for free standard shipping within the United States.
      This offer applies automatically at checkout.
      
      ## Tracking
      All orders include tracking information. You'll receive a tracking number
      via email once your order ships. You can track your package on our website
      or directly with the carrier.
      
      ## Shipping Restrictions
      Some items cannot be shipped to certain locations due to regulations.
      These restrictions will be noted on the product page.
      
  - title: "Return Policy"
    content: |
      # Return Policy
      
      ## Return Window
      You can return most items within 30 days of delivery for a full refund.
      The item must be in its original condition with all tags and packaging.
      
      ## Return Process
      To initiate a return:
      
      1. Contact customer support with your order number
      2. Receive a return authorization number (RMA)
      3. Pack the item securely with the RMA number visible
      4. Ship the item back using the provided prepaid label
      5. Refund will be processed within 5-7 business days after we receive the item
      
      ## Non-Returnable Items
      The following items cannot be returned:
      
      - Opened software or digital products
      - Personalized or custom-made items
      - Gift cards
      - Perishable goods
      - Intimate apparel or swimwear (for hygiene reasons)
      
      ## Exchanges
      We don't offer direct exchanges. Please return the item for a refund
      and place a new order for the item you want.
      
      ## Damaged or Defective Items
      If you receive a damaged or defective item, contact us immediately.
      We'll arrange for a replacement or full refund, including return shipping costs.
      
  - title: "Payment Methods"
    content: |
      # Payment Methods
      
      ## Accepted Payment Methods
      We accept the following payment methods:
      
      - **Credit Cards**: Visa, MasterCard, American Express, Discover
      - **Debit Cards**: All major debit cards
      - **Digital Wallets**: PayPal, Apple Pay, Google Pay
      - **Buy Now, Pay Later**: Affirm, Klarna (for orders over $50)
      
      ## Payment Security
      Your payment information is secure:
      
      - All transactions are encrypted using SSL technology
      - We never store your full credit card information
      - We comply with PCI DSS standards
      - Your payment data is processed by trusted payment providers
      
      ## Payment Issues
      If your payment is declined:
      
      1. Verify your card information is correct
      2. Check that you have sufficient funds
      3. Contact your bank to ensure they're not blocking the transaction
      4. Try a different payment method
      
      ## Billing Address
      Your billing address must match the address on file with your bank
      or credit card company. This helps prevent fraud.
      
      ## Currency
      All prices are displayed in USD. International customers may see
      currency conversion fees from their bank.
      
  - title: "Account Management"
    content: |
      # Account Management
      
      ## Creating an Account
      To create an account:
      
      1. Click "Sign Up" in the top right corner
      2. Enter your email address and create a password
      3. Verify your email address by clicking the link we send you
      4. Complete your profile with shipping and billing information
      
      ## Benefits of Having an Account
      - Faster checkout
      - Order history and tracking
      - Saved addresses and payment methods
      - Wishlist functionality
      - Exclusive member offers
      
      ## Resetting Your Password
      If you forget your password:
      
      1. Click "Forgot Password" on the login page
      2. Enter your email address
      3. Check your email for a password reset link
      4. Click the link and create a new password
      5. The link expires after 24 hours
      
      ## Updating Your Profile
      To update your account information:
      
      1. Log in to your account
      2. Go to "Account Settings"
      3. Update your name, email, addresses, or payment methods
      4. Click "Save Changes"
      
      ## Email Preferences
      You can manage your email preferences in Account Settings:
      
      - Order confirmations and shipping updates (cannot be disabled)
      - Marketing emails and special offers
      - Product recommendations
      - Newsletter subscription
      
      ## Deleting Your Account
      To delete your account:
      
      1. Contact customer support
      2. Request account deletion
      3. We'll process your request within 3-5 business days
      4. You'll receive a confirmation email
      
      Note: Account deletion is permanent and cannot be undone.
      Your order history will be retained for legal and accounting purposes.
      
  - title: "Order Tracking"
    content: |
      # Order Tracking
      
      ## How to Track Your Order
      Once your order ships, you'll receive a tracking number via email.
      
      To track your order:
      
      1. Log in to your account
      2. Go to "Order History"
      3. Click on the order you want to track
      4. Click the tracking number to see detailed shipping information
      
      Alternatively, you can track directly with the carrier using your
      tracking number.
      
      ## Tracking Information Updates
      Tracking information typically updates within 24 hours of shipment.
      If you don't see updates, the package may still be in transit to
      the first scanning facility.
      
      ## Order Status Meanings
      - **Processing**: We're preparing your order for shipment
      - **Shipped**: Your order has left our warehouse
      - **In Transit**: Your package is on its way to you
      - **Out for Delivery**: Your package will arrive today
      - **Delivered**: Your package has been delivered
      
      ## Delivery Issues
      If your tracking shows delivered but you haven't received your package:
      
      1. Check with neighbors or household members
      2. Look around your delivery location
      3. Wait 24 hours (sometimes marked delivered early)
      4. Contact the carrier
      5. Contact us if still not found after 48 hours

